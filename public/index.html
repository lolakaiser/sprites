<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sprite Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');
:root{
  --bg:#0d0d1a;--card:#13132b;--card2:#16163a;
  --accent:#e94560;--gold:#f5c842;--gummy:#ff79c6;--galaxy:#9b59b6;--base:#64b5f6;
  --text:#eef2ff;--muted:#8892b0;--border:rgba(255,255,255,0.07);
  --green:#2ecc71;--red:#e74c3c;
  --rare:#4a90e2;--epic:#a855f7;--legendary:#f59e0b;--mythic:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:calc(64px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top)}
header{background:linear-gradient(135deg,#0a0a1f,#1a0a2e,#0a1a2f);padding:10px 20px 8px;text-align:center;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.6)}
.logo{font-family:'Bangers',cursive;font-size:1.6rem;letter-spacing:4px;background:linear-gradient(90deg,#64b5f6,#ff79c6,#f5c842,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:.65rem;color:var(--muted);margin-top:1px;letter-spacing:2px;text-transform:uppercase}
.stats-bar{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.06);border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:700}
.stat span{color:var(--gold)}
.prog-wrap{max-width:280px;margin:6px auto 0;background:rgba(255,255,255,.08);border-radius:10px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--base),var(--gummy),var(--accent),var(--gold));border-radius:10px;transition:width .3s}
/* bottom tab bar */
.page-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0d0d1f;border-top:1.5px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.page-tab{flex:1;background:transparent;border:none;border-top:3px solid transparent;color:var(--muted);padding:10px 4px 6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.65rem;cursor:pointer;text-transform:uppercase;transition:all .18s;white-space:nowrap;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:56px}
.page-tab .tab-icon{font-size:1.3rem;line-height:1}
.page-tab.active{color:var(--accent);border-top-color:var(--accent)}
.ptabs{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;padding:12px 14px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ptab{background:rgba(255,255,255,.06);border:2px solid transparent;color:var(--muted);border-radius:24px;padding:8px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;min-height:44px;display:inline-flex;align-items:center}
.ptab.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.12)}
.toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:6px 14px 10px}
.btn{border:none;border-radius:16px;padding:10px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;min-height:44px}
.btn-p{background:var(--accent);color:#fff}
.btn-o{background:transparent;border:2px solid rgba(255,255,255,.2);color:var(--muted)}
.btn-save{background:#2ecc71;color:#fff}
.btn-save.dirty{animation:pulse-save 1.5s infinite}
@keyframes pulse-save{0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,.5)}50%{box-shadow:0 0 0 6px rgba(46,204,113,0)}}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:4px 16px 12px;font-size:.72rem;font-weight:700;color:var(--muted)}
.ldot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.twrap{overflow-x:auto;padding:0 10px 20px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:separate;border-spacing:0 4px}
thead th{padding:7px 8px;font-size:.68rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-align:center;color:var(--muted);background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
thead th:first-child{text-align:left;padding-left:14px;min-width:140px}
tbody tr{background:var(--card)}
tbody tr:nth-child(even){background:var(--card2)}
tbody tr:hover{background:#1e1e42}
tbody td{padding:7px 6px;text-align:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
tbody td:first-child{text-align:left;padding-left:14px;border-left:1px solid var(--border);border-radius:10px 0 0 10px}
tbody td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0}
.slabel{font-weight:800;font-size:.85rem;display:flex;align-items:center;gap:8px}
.simg{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.sinfo{display:flex;flex-direction:column;gap:3px}
.sname{font-weight:800;font-size:.82rem;line-height:1.1}
.pips{display:flex;gap:3px;margin-top:2px}
.pip{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1)}
.pb{background:var(--base)}.pg{background:var(--gold)}.pu{background:var(--gummy)}.px{background:var(--galaxy)}
/* check button with sprite image inside */
.cbtn{width:44px;height:44px;border-radius:10px;border:2px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;padding:0;overflow:hidden;position:relative}
.cbtn:hover{border-color:rgba(255,255,255,.35)}
.cbtn img{width:38px;height:38px;object-fit:contain;opacity:.25;transition:opacity .2s;filter:grayscale(80%)}
.cbtn.owned img{opacity:1;filter:none}
.cbtn.ob{border-color:var(--base);background:rgba(100,181,246,.15);box-shadow:0 0 10px rgba(100,181,246,.3)}
.cbtn.og{border-color:var(--gold);background:rgba(245,200,66,.15);box-shadow:0 0 10px rgba(245,200,66,.3)}
.cbtn.ou{border-color:var(--gummy);background:rgba(255,121,198,.15);box-shadow:0 0 10px rgba(255,121,198,.3)}
.cbtn.ox{border-color:var(--galaxy);background:rgba(155,89,182,.15);box-shadow:0 0 10px rgba(155,89,182,.3)}
.cbtn.mastered.ob{box-shadow:0 0 16px rgba(100,181,246,.7)}
.cbtn.mastered.og{box-shadow:0 0 16px rgba(245,200,66,.7)}
.cbtn.mastered.ou{box-shadow:0 0 16px rgba(255,121,198,.7)}
.cbtn.mastered.ox{box-shadow:0 0 16px rgba(155,89,182,.7)}
.cbtn.na{opacity:.2;cursor:default;pointer-events:none;font-size:.7rem;color:var(--muted)}
.check-overlay{position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:900;line-height:1}
.cbtn.owned .check-overlay{display:flex}
.cbtn.mastered .check-overlay{background:var(--gold);font-size:10px}
.rb{display:inline-flex;align-items:center;font-size:.62rem;font-weight:800;padding:1px 6px;border-radius:6px;text-transform:uppercase}
.rr{background:rgba(74,144,226,.15);color:var(--rare);border:1px solid rgba(74,144,226,.4)}
.re{background:rgba(168,85,247,.15);color:var(--epic);border:1px solid rgba(168,85,247,.4)}
.rl{background:rgba(245,158,11,.15);color:var(--legendary);border:1px solid rgba(245,158,11,.4)}
.rm{background:rgba(239,68,68,.15);color:var(--mythic);border:1px solid rgba(239,68,68,.4)}
.ovhdr{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 16px 6px}
.vfbtn{background:rgba(255,255,255,.06);border:2px solid transparent;color:var(--muted);border-radius:16px;padding:4px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent}
.vfbtn.ab{border-color:var(--base);background:rgba(100,181,246,.15);color:var(--text)}
.vfbtn.ag{border-color:var(--gold);background:rgba(245,200,66,.15);color:var(--text)}
.vfbtn.au{border-color:var(--gummy);background:rgba(255,121,198,.15);color:var(--text)}
.vfbtn.ax{border-color:var(--galaxy);background:rgba(155,89,182,.15);color:var(--text)}
.hcell{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900}
.hyes{background:rgba(46,204,113,.2);color:var(--green);border:1.5px solid var(--green)}
.hno{background:rgba(231,76,60,.12);color:var(--red);border:1.5px solid rgba(231,76,60,.4)}
.hmaster{background:rgba(245,200,66,.2);color:var(--gold);border:1.5px solid var(--gold)}
/* info page */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:0 14px 14px}
.icard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 10px;cursor:pointer;transition:all .18s;text-align:center;-webkit-tap-highlight-color:transparent}
.icard:active{transform:scale(.97)}
.icard img{width:64px;height:64px;object-fit:contain;margin-bottom:5px}
.iname{font-weight:800;font-size:.82rem;margin-bottom:4px}
.ieff{font-size:.65rem;color:var(--muted);line-height:1.35;margin-top:4px}
.itap{font-size:.6rem;color:rgba(255,255,255,.2);margin-top:6px;font-style:italic}
.rghdr{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:2px}
.rdot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.vsect{font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:2px;color:var(--gold);padding:16px 14px 8px}
.vcards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 24px}
.vcard{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px}
.vcname{font-weight:800;font-size:.82rem}
.vcdesc{font-size:.72rem;color:var(--muted);line-height:1.4;margin-top:4px}
/* bottom sheet */
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:flex-end;justify-content:center}
.sheet-ov.open{display:flex}
.sheet{background:#1a1a35;border:2px solid var(--border);border-radius:24px 24px 0 0;padding:0 20px 44px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.shandle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 18px}
.shdr{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.shdr img{width:72px;height:72px;object-fit:contain}
.sname-big{font-family:'Bangers',cursive;font-size:1.9rem;letter-spacing:2px;line-height:1}
.ssect{font-size:.65rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px;border-bottom:1px solid var(--border);padding-bottom:4px}
.seff{background:rgba(255,255,255,.04);border-radius:10px;padding:11px 13px;font-size:.87rem;line-height:1.6;border-left:3px solid var(--rare)}
.svrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.svrow:last-child{border-bottom:none}
.svrow img{width:40px;height:40px;object-fit:contain;flex-shrink:0}
.svn{font-weight:800;font-size:.82rem}
.svd{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.4}
.sclose{display:block;width:100%;margin-top:20px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:var(--muted);border-radius:12px;padding:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e42;border:1.5px solid var(--accent);border-radius:12px;padding:10px 20px;font-size:.82rem;font-weight:700;color:var(--text);z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.page{display:none}.page.active{display:block}
.cbase{color:var(--base)!important}.cgold{color:var(--gold)!important}.cgummy{color:var(--gummy)!important}.cgalaxy{color:var(--galaxy)!important}
@media(max-width:500px){
  .cbtn{width:46px;height:46px}
  .cbtn img{width:38px;height:38px}
  .simg{width:36px;height:36px}
  tbody td{padding:4px 2px}
  tbody td:first-child{padding-left:6px}
  .info-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .vcards{grid-template-columns:1fr}
  .twrap{padding:0 4px 20px}
  thead th{font-size:.6rem;padding:6px 4px}
  thead th:first-child{min-width:110px}
  .sname{font-size:.75rem}
  .rb{font-size:.55rem}
}
</style>
</head>
<body>
<header>
  <div class="logo">&#9889; SPRITE TRACKER</div>
  <div class="subtitle">Fortnite Emoticon Collection</div>
  <div class="stats-bar" id="sbar">
    <div class="stat">Owned: <span id="so">0</span></div>
    <div class="stat">&#11088; Mastered: <span id="sm">0</span></div>
    <div class="stat">Complete: <span id="sp">0%</span></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
</header>

<div class="page-tabs">
  <button class="page-tab active" id="tab-my" onclick="showPage('my')"><span class="tab-icon">⚡</span>My Collection</button>
  <button class="page-tab" id="tab-overview" onclick="showPage('overview')"><span class="tab-icon">👥</span>Group</button>
  <button class="page-tab" id="tab-info" onclick="showPage('info')"><span class="tab-icon">📖</span>Info</button>
</div>

<div class="page active" id="page-my">
  <div class="ptabs" id="ptabs"></div>
  <div class="toolbar">
    <button class="btn btn-p" onclick="checkAll()">&#10003; Check All</button>
    <button class="btn btn-o" onclick="uncheckAll()">&#10007; Uncheck All</button>
    <button class="btn btn-save" id="save-btn" onclick="saveAll()">&#128190; Save</button>
  </div>
  <div class="legend">
    <span><span class="ldot" style="background:var(--base)"></span>Base</span>
    <span><span class="ldot" style="background:var(--gold)"></span>Gold</span>
    <span><span class="ldot" style="background:var(--gummy)"></span>Gummy</span>
    <span><span class="ldot" style="background:var(--galaxy)"></span>Galaxy</span>
  </div>
  <div id="my-content"></div>
</div>

<div class="page" id="page-overview">
  <div class="ovhdr">
    <button class="vfbtn ab" id="vf0" onclick="setVF(0)">Base</button>
    <button class="vfbtn" id="vf1" onclick="setVF(1)">Gold</button>
    <button class="vfbtn" id="vf2" onclick="setVF(2)">Gummy</button>
    <button class="vfbtn" id="vf3" onclick="setVF(3)">Galaxy</button>
  </div>
  <div id="ov-content"></div>
</div>

<div class="page" id="page-info">
  <div id="info-content"></div>
</div>

<div class="sheet-ov" id="sheet-ov" onclick="sheetOvClick(event)">
  <div class="sheet" id="sheet-body">
    <div class="shandle"></div>
    <div id="sheet-inner"></div>
    <button class="sclose" onclick="closeSheet()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:"burntpeanut",name:"Burnt Peanut",r:"mythic",    v:[1,0,0,0], fx:"Small chance for bonus elimination loot, including Mythic items. Base only - no variants."},
  {id:"striker",    name:"Striker",     r:"epic",      v:[1,1,1,1], fx:"Gain an Overdrive speed boost after mantling, hurdling, or wall scrambling."},
  {id:"fishy",      name:"Fishy",       r:"rare",      v:[1,1,1,1], fx:"Swim speed way up, plus a brief movement speed boost when you take damage."},
  {id:"aura",       name:"Aura",        r:"epic",      v:[1,1,1,1], fx:"Earn a Shock Rock charge after dealing enough damage."},
  {id:"boss",       name:"Boss",        r:"legendary", v:[1,1,1,1], fx:"Increases your maximum Health and Shield."},
  {id:"grimreaper", name:"Grim Reaper", r:"mythic",    v:[1,1,1,1], fx:"Enemies who damage you become marked, revealing them to you."}
];

var VINFO = [
  {name:"Base",   desc:"Only the Sprite's normal ability - no extra bonus.", col:"var(--base)"},
  {name:"Gold",   desc:"3x Sprite XP from eliminations.",                   col:"var(--gold)"},
  {name:"Gummy",  desc:"+20% Sprite Dust when extracting the Sprite.",      col:"var(--gummy)"},
  {name:"Galaxy", desc:"+30% ammo from all ammo pickups.",                  col:"var(--galaxy)"}
];

var VCLS  = ["ob","og","ou","ox"];
var VKEYS = ["base","gold","gummy","galaxy"];
var RCLS  = {rare:"rr",epic:"re",legendary:"rl",mythic:"rm"};
var RDOT  = {rare:"#4a90e2",epic:"#a855f7",legendary:"#f59e0b",mythic:"#ef4444"};
var RLBL  = {rare:"Rare",epic:"Epic",legendary:"Legendary",mythic:"Mythic"};
var BCLR  = {rare:"var(--rare)",epic:"var(--epic)",legendary:"var(--legendary)",mythic:"var(--mythic)"};
var PLAYERS = ["Lola","Nate","Carly","Alex","Jake","Stylar"];

var allData = {};
var curPlayer = PLAYERS[0];
var curVF = 0;

function k(id, i) { return id + '_' + i; }

function pd(player) {
  if (!allData[player]) allData[player] = {};
  return allData[player];
}

function ownedLevel(player, id, i) {
  var v = pd(player)[k(id, i)];
  if (v === 2) return 2;
  if (v === true || v === 1) return 1;
  return 0;
}

function owned(player, id, i) { return ownedLevel(player, id, i) >= 1; }
function isMastered(player, id, i) { return ownedLevel(player, id, i) === 2; }

function switchP(name) {
  curPlayer = name;
  renderPTabs();
  renderMy();
  updateStats();
}

function renderPTabs() {
  var h = '';
  PLAYERS.forEach(function(p) {
    h += '<button class="ptab' + (p === curPlayer ? ' active' : '') + '" onclick="switchP(\'' + p + '\')">' + p + '</button>';
  });
  document.getElementById('ptabs').innerHTML = h;
}

function showPage(name) {
  ['my','overview','info'].forEach(function(pg) {
    document.getElementById('page-' + pg).classList.toggle('active', pg === name);
    document.getElementById('tab-' + pg).classList.toggle('active', pg === name);
  });
  if (name === 'info') renderInfo();
  if (name === 'overview') renderOv();
}

function updateStats() {
  var total = 0, got = 0, mastered = 0;
  SPRITES.forEach(function(s) {
    s.v.forEach(function(a, i) {
      if (a) {
        total++;
        var lv = ownedLevel(curPlayer, s.id, i);
        if (lv >= 1) got++;
        if (lv === 2) mastered++;
      }
    });
  });
  document.getElementById('so').textContent = got;
  document.getElementById('sm').textContent = mastered;
  document.getElementById('sp').textContent = total > 0 ? (got / total * 100).toFixed(0) + '%' : '0%';
  document.getElementById('pf').style.width = (total > 0 ? got / total * 100 : 0).toFixed(1) + '%';
}

function renderMy(){
  var h='<div class="twrap"><table>';
  h+='<thead><tr><th>Sprite</th>';
  h+='<th class="cbase">Base</th><th class="cgold">Gold</th><th class="cgummy">Gummy</th><th class="cgalaxy">Galaxy</th>';
  h+='<th style="color:var(--muted);font-size:.62rem">+</th></tr></thead><tbody>';
  SPRITES.forEach(function(s){
    var ro=0,rt=0;
    s.v.forEach(function(a,i){ if(a){rt++; if(owned(curPlayer,s.id,i))ro++;} });
    var rc=RCLS[s.r];
    var pipH="";
    s.v.forEach(function(a,i){
      if(!a)return;
      var pc=["pb","pg","pu","px"][i];
      pipH+='<div class="pip'+(owned(curPlayer,s.id,i)?" "+pc:"")+'"></div>';
    });
    var baseImg = IMGS[s.id] ? IMGS[s.id][0] : null;
    var imgEl = baseImg ? '<img src="'+baseImg+'" class="simg" alt="'+s.name+'" onerror="this.style.display=\'none\'">' : '';
    h+='<tr><td>';
    h+='<div class="slabel">'+imgEl+'<div class="sinfo"><span class="sname">'+s.name+'</span>';
    h+='<div style="display:flex;align-items:center;gap:5px"><div class="pips">'+pipH+'</div><span class="rb '+rc+'">'+RLBL[s.r]+'</span></div>';
    h+='</div></div></td>';
    s.v.forEach(function(a,i){
      if(!a){ h+='<td><button class="cbtn na">&mdash;</button></td>'; return; }
      var lv=ownedLevel(curPlayer,s.id,i);
      var vc=lv>0?VCLS[i]:"";
      var mc=lv===2?" mastered":"";
      var icon=lv===2?"&#11088;":lv===1?"&#10003;":"";
      var src=IMGS[s.id]?IMGS[s.id][i]:null;
      var imgInner=src?'<img src="'+src+'" alt="" onerror="this.style.display=\'none\'">':'';
      h+='<td><button class="cbtn '+(lv>0?"owned ":"")+vc+mc+'" onclick="toggle(\''+s.id+'\','+i+')">'+imgInner+'<div class="check-overlay">'+icon+'</div></button></td>';
    });
    var cc=ro===rt?"var(--gold)":"var(--muted)";
    h+='<td style="font-size:.7rem;font-weight:900;color:'+cc+'">'+ro+"/"+rt+"</td></tr>";
  });
  h+="</tbody></table></div>";
  document.getElementById("my-content").innerHTML=h;
}

function setVF(vi){
  curVF=vi;
  var cls=["ab","ag","au","ax"];
  [0,1,2,3].forEach(function(i){
    var b=document.getElementById("vf"+i);
    b.className="vfbtn"+(i===vi?" "+cls[i]:"");
  });
  renderOv();
}

function renderOv(){
  var vi=curVF;
  var vn=["Base","Gold","Gummy","Galaxy"][vi];
  var vis=SPRITES.filter(function(s){return s.v[vi];});
  var h='<div class="twrap"><table>';
  h+='<thead><tr><th>Sprite &mdash; '+vn+'</th>';
  PLAYERS.forEach(function(p){ h+='<th style="font-size:.7rem">'+p+'</th>'; });
  h+='<th style="color:var(--muted);font-size:.62rem">Have</th>';
  h+='<th style="color:var(--muted);font-size:.62rem">Need</th></tr></thead><tbody>';
  vis.forEach(function(s){
    var haves=PLAYERS.filter(function(p){return owned(p,s.id,vi);});
    var needs=PLAYERS.filter(function(p){return !owned(p,s.id,vi);});
    var src=IMGS[s.id]?IMGS[s.id][vi]:null;
    var img=src?'<img src="'+src+'" style="width:28px;height:28px;object-fit:contain;margin-right:6px;vertical-align:middle" alt="" onerror="this.style.display=\'none\'">':'';
    h+='<tr><td><div class="slabel">'+img+'<span style="font-weight:800;font-size:.82rem">'+s.name+'</span></div></td>';
    PLAYERS.forEach(function(p){
      var lv=ownedLevel(p,s.id,vi);
      var cls=lv===2?"hmaster":lv===1?"hyes":"hno";
      var icon=lv===2?"&#11088;":lv===1?"&#10003;":"&#10007;";
      h+='<td><div class="hcell '+cls+'">'+icon+'</div></td>';
    });
    var nc=needs.length>0?"var(--red)":"var(--muted)";
    h+='<td style="font-size:.75rem;font-weight:800;color:var(--green)">'+haves.length+'</td>';
    h+='<td style="font-size:.75rem;font-weight:800;color:'+nc+'">'+needs.length+'</td></tr>';
  });
  h+="</tbody></table></div>";
  document.getElementById("ov-content").innerHTML=h;
}

function renderInfo(){
  var order=["rare","epic","legendary","mythic"];
  var h="";
  order.forEach(function(r){
    var grp=SPRITES.filter(function(s){return s.r===r;});
    if(!grp.length)return;
    var rc=RCLS[r]; var rd=RDOT[r]; var rl=RLBL[r];
    h+='<div class="rghdr"><div class="rdot" style="background:'+rd+'"></div>';
    h+='<span class="rb '+rc+'">'+rl+'</span></div>';
    h+='<div class="info-grid">';
    grp.forEach(function(s){
      var eff=s.fx.length>65?s.fx.substring(0,65)+"...":s.fx;
      var src=IMGS[s.id]?IMGS[s.id][0]:null;
      var img=src?'<img src="'+src+'" width="64" height="64" style="object-fit:contain;margin-bottom:5px" alt="'+s.name+'" onerror="this.style.display=\'none\'">':'';
      h+='<div class="icard" onclick="openSheet(\''+s.id+'\')">'+img;
      h+='<div class="iname">'+s.name+'</div><span class="rb '+rc+'">'+rl+'</span>';
      h+='<div class="ieff">'+eff+'</div><div class="itap">tap for details</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="vsect">&#9889; Variant Bonuses</div><div class="vcards">';
  VINFO.forEach(function(v,i){
    h+='<div class="vcard"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
    h+='<span class="vcname" style="color:'+v.col+'">'+v.name+'</span></div>';
    h+='<div class="vcdesc">'+v.desc+'</div></div>';
  });
  h+='</div>';
  document.getElementById("info-content").innerHTML=h;
}

function openSheet(id){
  var s=null;
  SPRITES.forEach(function(x){if(x.id===id)s=x;});
  if(!s)return;
  var rc=RCLS[s.r]; var rl=RLBL[s.r]; var bc=BCLR[s.r];
  var baseSrc=IMGS[s.id]?IMGS[s.id][0]:null;
  var bigImg=baseSrc?'<img src="'+baseSrc+'" width="72" height="72" style="object-fit:contain" alt="'+s.name+'" onerror="this.style.display=\'none\'">':'';
  var h='<div class="shdr">'+bigImg+'<div><div class="sname-big">'+s.name+'</div><span class="rb '+rc+'">'+rl+'</span></div></div>';
  h+='<div class="ssect">Ability</div>';
  h+='<div class="seff" style="border-left-color:'+bc+'">'+s.fx+'</div>';
  h+='<div class="ssect">Variant Bonuses</div>';
  VINFO.forEach(function(v,i){
    var avail=s.v[i];
    var vsrc=IMGS[s.id]?IMGS[s.id][i]:null;
    var vimg=vsrc?'<img src="'+vsrc+'" width="40" height="40" style="object-fit:contain;flex-shrink:0" alt="" onerror="this.style.display=\'none\'">':'<div style="width:40px;height:40px;flex-shrink:0"></div>';
    if(!avail){
      h+='<div class="svrow" style="opacity:.3">'+vimg+'<div><div class="svn">'+v.name+' &mdash; Not available</div></div></div>';
      return;
    }
    h+='<div class="svrow">'+vimg+'<div><div class="svn" style="color:'+v.col+'">'+v.name+'</div><div class="svd">'+v.desc+'</div></div></div>';
  });
  document.getElementById("sheet-inner").innerHTML=h;
  document.getElementById("sheet-ov").classList.add("open");
  document.body.style.overflow="hidden";
}

function sheetOvClick(e){
  if(e.target===document.getElementById("sheet-ov"))closeSheet();
}
function closeSheet(){
  document.getElementById("sheet-ov").classList.remove("open");
  document.body.style.overflow="";
}

var _tt;
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(_tt);
  _tt=setTimeout(function(){t.classList.remove("show");},2500);
}

var API = '/api/sprites';

async function loadData() {
  try {
    var res = await fetch(API);
    allData = await res.json();
  } catch(e) {
    toast('Could not connect to database');
  }
}

async function saveToggle(player, spriteId, vi, owned) {
  try {
    await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({player: player, spriteId: spriteId, variantIdx: vi, owned: owned})
    });
  } catch(e) {
    toast('Save failed - check connection');
  }
}

function markDirty() {
  document.getElementById('save-btn').classList.add('dirty');
}

function toggle(id, i) {
  pd(curPlayer)[k(id,i)] = (ownedLevel(curPlayer,id,i) + 1) % 3;
  renderMy(); renderOv(); updateStats();
  markDirty();
}

function checkAll(){
  SPRITES.forEach(function(s){ s.v.forEach(function(a,i){ if(a && ownedLevel(curPlayer,s.id,i)===0) pd(curPlayer)[k(s.id,i)]=1; }); });
  renderMy(); renderOv(); updateStats();
  markDirty(); toast('All checked — hit Save to keep!');
}

function uncheckAll(){
  if(!confirm('Uncheck everything for '+curPlayer+'?')) return;
  allData[curPlayer]={};
  renderMy(); renderOv(); updateStats();
  markDirty(); toast('All cleared — hit Save to keep!');
}

async function saveAll(){
  var btn = document.getElementById('save-btn');
  btn.textContent = '...'; btn.disabled = true;
  var ps = [];
  SPRITES.forEach(function(s){
    s.v.forEach(function(a,i){
      if(!a) return;
      ps.push(saveToggle(curPlayer, s.id, i, !!owned(curPlayer,s.id,i)));
    });
  });
  try {
    await Promise.all(ps);
    btn.classList.remove('dirty');
    toast('Saved to MongoDB!');
  } catch(e) {
    toast('Save failed — check connection');
  }
  btn.textContent = '💾 Save'; btn.disabled = false;
}

(async function(){
  await loadData();
  renderPTabs();
  renderMy();
  updateStats();
})();

</script>
</body>
</html>
